# Dependency vulnerability audit (pip-audit over the pinned locks).
#
# Runs ON GITHUB (Actions runners) — NOT on a contributor's machine. The local twin for ad-hoc /
# offline runs is tools/audit-deps.ps1 (same checks, same ignore list).
#
# WHY a separate workflow (vs a step in release.yml): so the scan runs on a SCHEDULE — a lock can
# become vulnerable when a *new* advisory is published, with no code change to trigger anything. The
# weekly cron catches exactly that. It also runs at release time (v* tag) and on PRs that touch the
# locks, and on demand.
#
# Relationship to Dependabot: Dependabot alerts/security-updates (repo settings) are the always-on
# background watch + auto-fix PRs. THIS is a deterministic gate on the exact shipped locks, on our own
# schedule. The two are complementary.
#
# pip-audit is installed in ISOLATION (pipx) — never into the app's runtime/dev venv — so the scanner
# and its transitive deps can't perturb the audited dependency surface. (--no-deps audits the exact
# pinned versions over OSV without installing the packages, so a Linux runner can audit the win_amd64
# ship lock fine.)
name: audit

on:
  schedule:
    - cron: "17 6 * * 1"          # Mondays ~06:17 UTC (off-peak)
  push:
    tags: ["v*"]                  # audit at release time
  pull_request:
    paths:
      - "requirements*.txt"
      - "requirements*.in"
      - ".github/workflows/audit.yml"
      - "tools/audit-deps.ps1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit (isolated via pipx)
        run: pipx install pip-audit

      # Accepted, track-only advisories are ignored here AND in tools/audit-deps.ps1 and recorded in
      # PROGRESS.md "Open follow-ups". Keep the three in sync; drop an entry when the dep is bumped.
      #   GHSA-jm82-fx9c-mx94 — pypdf 6.13.2 memory-DoS, fix 6.13.3 (fallback engine only).
      - name: Audit ship lock (requirements-win.txt)
        run: pip-audit -r requirements-win.txt --no-deps --desc --ignore-vuln GHSA-jm82-fx9c-mx94

      - name: Audit dev lock (requirements-dev.txt)
        run: pip-audit -r requirements-dev.txt --no-deps --desc --ignore-vuln GHSA-jm82-fx9c-mx94

      - name: Audit build lock (requirements-build-win.txt)
        run: pip-audit -r requirements-build-win.txt --no-deps --desc --ignore-vuln GHSA-jm82-fx9c-mx94
